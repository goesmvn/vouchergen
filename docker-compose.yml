services:
  voucher-generator:
    build: .
    container_name: voucher-generator
    restart: always
    ports:
      - "3005:3000"
    environment:
      - DB_PATH=/data/database.sqlite
      - CHATBOT_URL=http://chatbot:5000
    volumes:
      - voucher-data:/data
    depends_on:
      - chatbot
    networks:
      - default
      - dokploy-network

  chatbot:
    build:
      context: ./chatbot
    container_name: voucher-chatbot
    restart: always
    ports:
      - "5001:5000"
    environment:
      - DB_PATH=/data/database.sqlite
    volumes:
      - voucher-data:/data
    networks:
      - default

networks:
  dokploy-network:
    external: true

volumes:
  voucher-data:

